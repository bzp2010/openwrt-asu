services:
  asu:
    build:
      context: .
      dockerfile: asu/Dockerfile
    restart: unless-stopped
    privileged: true
    tty: true
    environment: []
    #  - DEFAULT_REPOSITORIES={"nikki":"http://127.0.0.1/packages/x86_64/custom/"}
    #  - DEFAULT_REPOSITORY_KEYS=["-----BEGIN PUBLIC KEY-----\n...public_key...\n-----END PUBLIC KEY-----\n"]
    #  - REPOSITORY_ALLOW_LIST=["http://127.0.0.1/packages/x86_64/custom/"]
    volumes:
      - asu_data:/asu/public
      - asu_podman:/home/podman/.local/share/containers

  redis:
    image: "redis/redis-stack-server"
    restart: unless-stopped
    volumes:
      - redis_data:/data/

  caddy:
    image: caddy:latest
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/Caddyfile:ro
    command: caddy run --config /Caddyfile
    ports:
      - "8000:80"

volumes:
  asu_podman:
  asu_data:
  redis_data:
